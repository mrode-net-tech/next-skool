services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: my_api
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  db_test:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: my_api_test
    ports:
      - '5433:5432'

volumes:
  db_data:
